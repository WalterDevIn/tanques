<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tank Mobility</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="shell">
    <section class="panel">
      <h1>Tank Mobility</h1>
      <p>Prototipo arcade de tanques enfocado en movilidad: inercia, orugas, derrape, boost y control de curva.</p>
      <div class="controls">
        <span>W acelerar</span>
        <span>S frenar/reversa</span>
        <span>A/D girar</span>
        <span>Space derrape</span>
        <span>Shift boost</span>
        <span>R reiniciar</span>
        <span>Mouse apunta</span>
        <span>Click dispara</span>
      </div>
    </section>

    <canvas id="game" width="960" height="640" aria-label="Juego de tanques"></canvas>
  </main>

  <script src="src/main.js"></script>
</body>
</html>
